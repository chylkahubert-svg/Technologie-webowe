         <div class="form">

            <input type="text" name="" id="text" autofocus>
        </div>
        <form action="form2">

        <!-- .form>label{label}+input:p#pass -->
         <div class="form">

        <!-- .form>label{label}+input:email#eml -->
        <div class="form">
            <label for="">label</label>
            <input type="email" name="" id="eml">
        </div>

        <!-- .form>label{label}+input:f#file -->
        <div class="form">
            <label for="">label</label>
            <input type="file" name="" id="file">
        </div>

        <!-- .form>label{label}+input:date#date -->
        <div class="form">
            <label for="">label</label>
            <input type="date" name="" id="date">
        </div>

        <!-- .form>label{label}+input:color#color -->
        <div class="form">
            <label for="">label</label>
            <input type="color" name="" id="color">
        </div>

        <!-- .form>label{label}+input:number#number -->
        <div class="form">
            <label for="">label</label>
            <input type="number" name="" id="number">

        <div class="form">

        <!-- .form>label{list}+select>option*3  -->
        <div class="form"><label for="">list</label>
            <select name="" id="">
                <option value="aa">aa</option>
                <option value="bb">bb</option>
                <option value="cc">cc</option>
            </select>
        </div> 
        <div class="form"><label for="">list2</label>
            <select name="" id="" multiple size="2">

                <option value="bb">bb</option>
                <option value="cc">cc</option>

        </div>

        </div>

        <!-- .form>(input:c+label{c$})*3 -->

            <input type="checkbox" name="c" id="">
            <label for="">c1</label>
            <input type="checkbox" name="c" id="">
            <label for="">c2</label>
            <input type="checkbox" name="c" id="">
            <label for="">c3</label>
        </div>

        <!-- input:reset -->
        <input type="reset" value="reset">
        <!-- input:submit -->
        <input type="submit" value="submit">
